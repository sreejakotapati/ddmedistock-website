apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddmedistock-app
  namespace: ddmedistock
  labels:
    app.kubernetes.io/name: ddmedistock
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ddmedistock
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ddmedistock
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      # Run pending migrations once before the app containers start.
      initContainers:
        - name: migrate
          image: ghcr.io/sreejakotapati/ddmedistock:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: ddmedistock-config
            - secretRef:
                name: ddmedistock-secrets
      containers:
        - name: app
          image: ghcr.io/sreejakotapati/ddmedistock:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ddmedistock-config
            - secretRef:
                name: ddmedistock-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
