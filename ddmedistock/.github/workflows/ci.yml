name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Real Postgres with pgvector so migrations and DB-backed checks run for real.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ddmedistock
          POSTGRES_PASSWORD: ddmedistock
          POSTGRES_DB: ddmedistock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ddmedistock"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ddmedistock:ddmedistock@localhost:5432/ddmedistock?schema=public"
      JWT_SECRET: "ci-test-secret"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm test

      - name: Build
        run: npm run build

  # End-to-end browser tests run in their own job so a Playwright/Chromium issue
  # never blocks the core build-and-test gate. OCR binaries (tesseract/poppler)
  # are installed so the upload path works in this environment.
  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    # E2E is a secondary, non-blocking signal (browser/harness layer). The
    # deployability gate is build-and-test + docker. See docs/e2e/.
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ddmedistock
          POSTGRES_PASSWORD: ddmedistock
          POSTGRES_DB: ddmedistock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ddmedistock"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ddmedistock:ddmedistock@localhost:5432/ddmedistock?schema=public"
      JWT_SECRET: "ci-test-secret"
      NEXT_TELEMETRY_DISABLED: "1"
      CI: "true"
      # The E2E suite logs in many times from one IP; raise the auth rate limit
      # so the brute-force guard (default 10/min) doesn't throttle the run.
      AUTH_RATE_LIMIT: "1000"
      API_RATE_LIMIT: "5000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: System OCR tools
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ddmedistock:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
